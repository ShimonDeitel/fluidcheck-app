name: FluidLevelsChecklist
options:
  bundleIdPrefix: com.shimondeitel.fluidcheck
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  FluidLevelsChecklist:
    type: application
    platform: iOS
    sources:
      - path: FluidLevelsChecklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fluidcheck
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: FluidLevelsChecklist/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FluidLevelsChecklistTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FluidLevelsChecklistTests
      - path: FluidLevelsChecklist.storekit
    dependencies:
      - target: FluidLevelsChecklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fluidcheck.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FluidLevelsChecklistUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FluidLevelsChecklistUITests
    dependencies:
      - target: FluidLevelsChecklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fluidcheck.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  FluidLevelsChecklist:
    build:
      targets:
        FluidLevelsChecklist: all
        FluidLevelsChecklistTests: [test]
        FluidLevelsChecklistUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: FluidLevelsChecklist.storekit
    test:
      config: Debug
      storeKitConfiguration: FluidLevelsChecklist.storekit
      targets:
        - FluidLevelsChecklistTests
        - FluidLevelsChecklistUITests
    archive:
      config: Release
